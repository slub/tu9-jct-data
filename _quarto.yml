project:
  type: website
  output-dir: _site
  execute-dir: project
  # Publish the data files into the site at clean, prefix-free URLs (no /data/
  # or /data-raw/). See scripts/publish_data.R for the source -> URL mapping.
  post-render:
    - scripts/publish_data.R

execute:
  echo: false
  warning: false
  message: false

website:
  title: "TU9 Transformative Agreements"
  description: >-
    Transformative-agreement metadata for the TU9 universities,
    sourced from the Journal Checker Tool (CC0).
  repo-url: https://github.com/slub/tu9-jct-data
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: agreements.qmd
        text: Agreements
      - href: journals.qmd
        text: Journals
      - href: institutions/index.qmd
        text: Institutions
      - href: downloads.qmd
        text: Downloads
    right:
      - icon: github
        href: https://github.com/slub/tu9-jct-data
        text: GitHub
        aria-label: GitHub repository
  page-footer:
    left: "Data: Journal Checker Tool (CC0) · Code: MIT"
    right: "Built with Quarto"

format:
  html:
    theme: cosmo
    toc: true
    page-layout: full
